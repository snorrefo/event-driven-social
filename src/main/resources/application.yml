spring:
  application:
    name: event-driven-social

  datasource:
    url: jdbc:postgresql://localhost:5432/social_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for schema management
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show_sql: false
    open-in-view: false  # Best practice: disable OSIV

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# AWS configuration (will be overridden by environment variables)
aws:
  region: ${AWS_REGION:eu-north-1}
  sns:
    posts-created: ${POSTS_CREATED_TOPIC_ARN:}
    users-followed: ${USERS_FOLLOWED_TOPIC_ARN:}
    posts-liked: ${POSTS_LIKED_TOPIC_ARN:}
  sqs:
    timeline-events: ${TIMELINE_EVENTS_QUEUE_URL:}
    notification-events: ${NOTIFICATION_EVENTS_QUEUE_URL:}

logging:
  level:
    root: INFO
    io.github.snorrefo.event_driven_social: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
